
name: Build and deploy Zola website

on:
  push:
    branches:
      - main   # change to master if that's your branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # ✅ FIXED

      - name: Build Zola + upload Pages artifact
        uses: getzola/github-pages@v1   # simpler + maintained
        with:
          zola_version: v0.22.0
          # no project_dir needed because it's in root

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
